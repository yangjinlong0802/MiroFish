services:
  backend:
    build: ./backend
    container_name: mirofish-backend
    env_file:
      - .env
    ports:
      - "8001:5001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mirofish-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
